<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>position</title>
    <style>
        body {
             background-color: cornflowerblue;
            height: 100vh;
        }
        .positions{
            margin:10px;
            padding: 15px;
            color:white;
            width: 500px;
        }
        .relative{
            background-color: navy;
            padding: 15px;
            margin: 10px;
            position: relative;
            left: 20px;
            right: 50px;
            bottom: 50px;
        }
        .absolute{
            background-color: crimson;
            padding: 15px;
            margin: 10px;
            position: absolute;
            bottom: 20px;
        }
        .fixed{
            background-color: green;
            padding: 15px;
            margin: 10px;
            position: fixed;
            bottom: 10px;
            
        }
        .sticky{
            background-color: orange;
            color: white;
            padding: 10px;
            margin: 10px;
            position: sticky;
            top: 50px;
        }
    </style>
</head>
<body>
    <div class="positions">
        <div class="relative">Relative positions opp direction</div>
        <div class="absolute">Absolute positions opp direction</div>
        <div class="fixed">Fixed positions opp direction</div>
    </div>
    <div class="sticky">when its turn fixed to their positions</div>
</body>
</html>
