<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <h1>Registration Form</h1>
    <form>
        <lable>name</lable>
        <input type="text" placeholder="Enter your username"><br><br>
        <lable>Email</lable>
        <input type="email" placeholder="Enter your email"><br><br>
        <lable>Gender</lable>
        <input type="radio" name="gender" value="male">Male
        <input type="radio" name="gender" value="female">Female<br><br>
        <lable>Password</lable>
        <input type="password" placeholder="Enter your password"><br><br>
        <lable>technologies</lable>
        <input type="checkbox" name="tech" value="html">HTML
        <input type="checkbox" name="tech" value="css">CSS<br><br>
        <lable>Phone number</lable>
        <input type="tel" placeholder="Enter your phone number"><br><br>
        <label>Experience</label>
        <input type="number" placeholder="Enter your experience in years"><br><br>
        <label>Date of Birth</label>
        <input type="date"><br><br>
        <label>time</label>
        <input type="time"><br><br>
        <label>range</label>
        <input type="range"><br><br>
        <label>color</label>
        <input type="color"><br><br>
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">><br>
        <label>select your country</label>
        <select>
            <option value="india">India</option>
            <option value="usa">USA</option>
            <option value="uk">UK</option>
            <option value="australia">Australia</option>
        </select><br><br>
        <label>Drop your comments:</label>
        <textarea rows="6" cols="10" placeholder="enter your comments"></textarea>
    </form>
</body>
</html>
