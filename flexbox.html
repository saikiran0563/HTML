<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexBox</title>
    <style>
        *{
              margin:0;
            padding:0;
            box-sizing: border-box;
        }
        body{
            height:100px ;
            background-color: aquamarine;
            color: aliceblue;
            font-family: Arial, Helvetica, sans-serif;
        }
        .container{
            height:100vh;
            margin: 10px;
            padding: 5px;
            text-align: center;
            display:flex;
            flex-direction: wrap;
            gap:10px;
            justify-content:center;
            align-items:center;
        }
        .box1
        {
            background-color: brown;
            height: 100px;
            width: 100px;
            margin-bottom: 10px;
        }
        .box2
        {
background-color: brown;
height: 100px;
width: 100px;
margin-bottom: 10px;
align-self: flex-end;
        }
        .box3
        {
background-color: brown;
height: 100px;
width: 100px;
margin-bottom: 10px;
flex-grow: calc(20);
        }
        .box4
        {
background-color: brown;
height: 100px;
width: 100px;
margin-bottom: 10px;
flex-shrink: var(20);
        }
    </style>
</head>
<body>
    <div class="container">
    <div class="box1">1</div>
    <div class="box2">2</div>
    <div class="box3">3</div>
    <div class="box4">4</div>
    </div>
</body>
</html>
