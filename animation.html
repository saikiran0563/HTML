<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>animation</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing: border-box;
        }
        body{
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            margin-top: 30px;
            background-color: darkcyan;

        }
        h1{
            color:aliceblue;
            font-size: 35px;
            font-weight: bold;
            text-align: center;
            /* animation: name duration timing-function delay iteration-count direction fill-mode; */
            animation:  color-change 3s ease-in-out 0.5s 5;
        }
        @keyframes color-change {
            0%{
                color:darkblue;
                font-family: Arial, Helvetica, sans-serif;
                font-size: 10px;
            }
            100%{
                color:brown;
            }
            
        }
        .box{
            box-sizing: 30px;
            width: 10px;
            height: 10px;
            color: brown;
            animation: position-change 3s ease-in 0.4s 3;

        }
        @keyframes position-change {
            0%{
                top: 0%;
                left: 0%;
            }
            25%{
                top: 0%;
                left: 90%;
            }
            50%{
                left: 90%;
                top: 70%;
            }
            75%{
                left: 0%;
                top: 70%;
            }
            100%{
                top: 0%;
                left: 0%;
            }
        }
    </style>
</head>
<body >
    <h1>
        css animations
    </h1>
    <div class="box"></div>
</body>
</html>
