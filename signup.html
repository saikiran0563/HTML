<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sign up,box model</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing: border-box;
        }
        body{
            height:100vh;
            background-color: rgb(204, 240, 240);
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
            margin-top: 10%;
        }
        .form-container{
            border: 2px solid #ddd;
            height:40%;
            width: 40%;
            border-radius: 5px;
            padding: 10px;
            margin:10px;
            margin-left: 30%;
            background-color:transparent;
        }
        h2{
            font-size: 30px;
            font-weight: bold;
            padding-bottom: 20px;
        }
        input{
            padding: 10px;
            width:75%;
            border:1px solid white;
            border-radius: 5px;
            background-color: transparent;
        }
        label{
            padding-bottom: 10px;
            font-size: 20px;
            color:black
        }
        button{
            padding:5px;
            width:50%;
            background-color: rgb(14, 14, 4);
            border: none;
            border-radius: 5px;
            color:#fff
        }
    </style>
</head>
<body>
    <form class="form-container">
        <h2>sign up form</h2>
        <lable>Fullname:</lable>
        <input type="text" placeholder="enter your name"/><br><br>
        <lable> email:</lable>
        <input type="email" placeholder="enter your email"/><br><br>
        <lable>password:</lable>
        <input type="password" placeholder="enter your password"/><br><br>
        <button type="submit">submit</button>


    </form>
</body>
</html>
